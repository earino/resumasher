name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref — keeps the
# queue clean when someone force-pushes a branch mid-review.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # README claims "Python 3.10+". CI enforces the claim end-to-end so a
        # student on 3.10 can trust the install.sh + pipeline path. Drop a
        # row here only after bumping the README badge.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      # Upload the golden-fixture PDFs as artifacts so a failing round-trip
      # test is easy to debug — download the exact PDF CI produced and open it.
      - name: Upload golden-fixture PDFs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-fixture-pdfs-py${{ matrix.python-version }}
          path: /tmp/resumasher-ci-pdfs/
          if-no-files-found: ignore
          retention-days: 7
